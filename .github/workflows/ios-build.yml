name: iOS Ad-hoc Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update

      - name: Import distribution certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PWD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID xml1 -o - - | \
            sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Installed profile: $UUID"

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/musemonitorapp.xcworkspace \
            -scheme musemonitorapp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MusePlus.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="bd1ff32d-68d9-43e5-b8d0-29318661d593" \
            DEVELOPMENT_TEAM=YZN764NT86 \
            | xcpretty --simple --color

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/MusePlus.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            | xcpretty --simple --color

      - name: Create release and upload IPA + manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.1.7-$(date +%Y%m%d-%H%M)"
          REPO="drchord/muse-monitor-app"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"
          IPA_URL="$BASE_URL/MusePlus.ipa"
          MANIFEST_URL="$BASE_URL/manifest.plist"

          # Create manifest.plist
          cat > $RUNNER_TEMP/manifest.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>items</key><array><dict>
              <key>assets</key><array><dict>
                <key>kind</key><string>software-package</string>
                <key>url</key><string>$IPA_URL</string>
              </dict></array>
              <key>metadata</key><dict>
                <key>bundle-identifier</key><string>org.name.musemonitorapp</string>
                <key>bundle-version</key><string>1.1.7</string>
                <key>kind</key><string>software</string>
                <key>title</key><string>Muse Plus</string>
              </dict>
            </dict></array>
          </dict></plist>
          PLIST

          INSTALL_URL="itms-services://?action=download-manifest&url=$MANIFEST_URL"

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Muse Plus 1.1.7" \
            --notes "INSTALL_URL: $INSTALL_URL" \
            $RUNNER_TEMP/ipa/*.ipa#MusePlus.ipa \
            $RUNNER_TEMP/manifest.plist#manifest.plist

          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "INSTALL_URL=$INSTALL_URL" >> $GITHUB_OUTPUT
        id: release
