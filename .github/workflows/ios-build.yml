name: iOS App Store Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Select Xcode 26
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_26" ]; then
            sudo xcode-select -s "$XCODE_26/Contents/Developer"
            echo "Selected: $XCODE_26"
          else
            echo "Xcode 26 not found. Available:"
            ls -d /Applications/Xcode*.app 2>/dev/null
            exit 1
          fi
          xcodebuild -version

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update

      - name: Import distribution certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PWD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

      - name: Setup ASC API key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          mkdir -p $RUNNER_TEMP/private_keys
          echo "$ASC_API_KEY" > $RUNNER_TEMP/private_keys/AuthKey_9V47M72GKG.p8
          chmod 600 $RUNNER_TEMP/private_keys/AuthKey_9V47M72GKG.p8

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/musemonitorapp.xcworkspace \
            -scheme musemonitorapp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MusePlus.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyID 9V47M72GKG \
            -authenticationKeyIssuerID 620b8c6b-545b-4fb4-8b7f-4b527a671243 \
            -authenticationKeyPath $RUNNER_TEMP/private_keys/AuthKey_9V47M72GKG.p8 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=YZN764NT86 \
            PROVISIONING_PROFILE_SPECIFIER="1f724b01-e603-4f51-8162-e63b5844daf9" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/MusePlus.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID 9V47M72GKG \
            -authenticationKeyIssuerID 620b8c6b-545b-4fb4-8b7f-4b527a671243 \
            -authenticationKeyPath $RUNNER_TEMP/private_keys/AuthKey_9V47M72GKG.p8
          ls -la $RUNNER_TEMP/ipa/

      - name: Upload to TestFlight
        run: |
          IPA_PATH=$(ls $RUNNER_TEMP/ipa/*.ipa | head -1)
          echo "Uploading: $IPA_PATH"
          mkdir -p ~/.appstoreconnect/private_keys
          cp $RUNNER_TEMP/private_keys/AuthKey_9V47M72GKG.p8 ~/.appstoreconnect/private_keys/
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --type ios \
            --apiKey 9V47M72GKG \
            --apiIssuer 620b8c6b-545b-4fb4-8b7f-4b527a671243 \
            --verbose
          echo "Uploaded to TestFlight"
